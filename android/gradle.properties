# ============================================================
# FILE: android/gradle.properties
# ============================================================

# JVM memory — 4GB heap for release builds
org.gradle.jvmargs=-Xmx4g -Xms512m -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -Dfile.encoding=UTF-8

# Disable daemon (prevents "daemon disappeared" crashes)
org.gradle.daemon=false

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Kotlin
kotlin.code.style=official
kotlin.incremental=false


# Build performance
org.gradle.parallel=false
org.gradle.caching=false

# Suppress AGP warning
android.suppressUnsupportedCompileSdk=36

# Limit workers to prevent OOM
org.gradle.workers.max=2

# Dart AOT memory — critical for release builds on low-RAM machines
# These env vars are picked up by flutter's dart snapshot compiler
dart.vm.extra-options=--old_gen_heap_size=2048
