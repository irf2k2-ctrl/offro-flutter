name: offro_user
description: Offro - Smart Savings Nearby

publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.1.0

  # QR Scanner
  mobile_scanner: ^3.5.6

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Storage
  shared_preferences: ^2.2.2

  # Image picker
  image_picker: ^1.0.7

  # URL launcher
  url_launcher: ^6.2.5

  # Native Razorpay SDK — opens checkout directly (UPI, cards, wallets)
  razorpay_flutter: ^1.3.5
  share_plus: ^10.0.3        # FIX 12+14: Share vouchers & invoices
  printing: ^5.13.1          # FIX 14: PDF download for invoices

  # Image caching — loads and caches network images locally
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0

  # Shimmer skeleton loading effect
  shimmer: ^3.0.0

  # Firebase push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # MSG91 OTP Widget SDK (client-side OTP — no DLT needed)
  sendotp_flutter_sdk: ^0.0.2

  # Cupertino icons
  cupertino_icons: ^1.0.6

  # Sharing
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/onboarding/
    - assets/offers/
